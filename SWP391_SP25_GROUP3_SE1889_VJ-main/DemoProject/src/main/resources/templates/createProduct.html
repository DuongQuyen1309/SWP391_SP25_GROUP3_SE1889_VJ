<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Product</title>
</head>
<body>
<h2>Create New Product</h2>

<p th:if="${message}" style="color: green;">[[${message}]]</p>
<p th:if="${error}" style="color: red;">[[${error}]]</p>

<form action="#" th:action="@{/products/create}" th:object="${productDTO}" method="post">
    <label>Name:</label>
    <input type="text" th:field="*{name}" required><br>

    <label>Description:</label>
    <textarea th:field="*{description}"></textarea><br>

    <label>Price:</label>
    <input type="number" th:field="*{price}" required><br>

    <button type="submit">Create</button>
</form>
</body>
</html>
